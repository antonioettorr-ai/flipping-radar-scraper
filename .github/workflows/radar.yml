name: Flipping Radar

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  scan:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: playwright install chromium

      - run: python main.py
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
